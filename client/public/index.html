<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RolinChat - RPG Social MVP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Pantalla de Inicio -->
        <section id="main-menu" class="view active">
            <div class="glass-card">
                <h1>RolinChat</h1>
                <p>Plataforma Social de Roleplay Narrativo</p>

                <div class="menu-actions">
                    <div class="input-group">
                        <input type="text" id="player-name" placeholder="Tu nombre de narrador..." maxlength="30">
                    </div>

                    <div class="button-group">
                        <button id="btn-show-creator" class="btn-primary">Configurar Personajes</button>
                    </div>

                    <div class="button-group">
                        <button id="btn-create-room" class="btn-secondary">Crear Nueva Sala</button>
                    </div>

                    <div class="divider"><span>o</span></div>

                    <div class="input-group">
                        <input type="text" id="room-code" placeholder="Código de Sala (8 chars)" maxlength="8">
                        <button id="btn-join-room" class="btn-secondary">Unirse</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Creador de Avatares -->
        <section id="avatar-view" class="view">
            <div class="glass-card creator-card">
                <h2>Mis Personajes</h2>

                <div class="profiles-list-container">
                    <ul id="profiles-list"></ul>
                    <button id="btn-new-profile" class="btn-small">+ Nuevo Personaje</button>
                </div>

                <div id="profile-editor" class="hidden">
                    <hr>
                    <div class="input-group">
                        <input type="text" id="av-nombre" placeholder="Nombre del personaje" maxlength="30">
                    </div>
                    <div class="input-group">
                        <textarea id="av-desc" placeholder="Descripción/Historia..." maxlength="500"></textarea>
                    </div>
                    <div class="select-group">
                        <select id="av-raza">
                            <option value="">Seleccionar Raza</option>
                        </select>
                        <select id="av-sexo">
                            <option value="">Seleccionar Sexo</option>
                        </select>
                    </div>
                    <div class="image-selector">
                        <p>Imagen del Avatar (URL):</p>
                        <input type="text" id="av-imagen" placeholder="URL de la imagen o asset path">
                        <div class="preview-box">
                            <img id="av-preview" src="assets/avatars/placeholder.png" alt="Preview">
                        </div>
                    </div>
                    <div class="button-group horizontal">
                        <button id="btn-save-profile" class="btn-primary">Guardar</button>
                        <button id="btn-cancel-profile" class="btn-secondary">Cancelar</button>
                    </div>
                </div>

                <div class="footer-actions">
                    <button id="btn-back-menu" class="btn-secondary">Volver al Menú</button>
                </div>
            </div>
        </section>

        <!-- Pantalla de Juego -->
        <section id="game-view" class="view">
            <header class="game-header">
                <div class="room-info">
                    <span id="display-room-name">Sala: ...</span>
                    <span id="display-room-code" class="code-badge">#CODE</span>
                </div>
                <div class="user-info">
                    <span id="display-player-name">Jugador</span>
                    <button id="btn-leave-room" class="btn-danger">Salir</button>
                </div>
            </header>

            <main id="game-container">
                <!-- Aquí se inyectará el Canvas de Phaser -->
                <div id="phaser-container"></div>

                <!-- Overlay de Invitación -->
                <div id="scene-invite-overlay" class="game-overlay hidden">
                    <div class="glass-card overlay-card">
                        <h3>Invitación de Rol</h3>
                        <p id="invite-text">Jugador te invita a una escena en Objeto.</p>
                        <div class="button-group horizontal">
                            <button id="btn-accept-invite" class="btn-primary">Aceptar</button>
                            <button id="btn-reject-invite" class="btn-secondary">Ignorar</button>
                        </div>
                    </div>
                </div>

                <!-- Overlay de Selección de Acción -->
                <div id="scene-selection-overlay" class="game-overlay hidden">
                    <div class="glass-card overlay-card">
                        <h3>Seleccionar Acción</h3>
                        <p id="selection-partner-text">Con Jugador</p>
                        <div id="actions-list" class="button-grid">
                            <!-- Acciones filtradas aquí -->
                        </div>
                        <button id="btn-cancel-selection" class="btn-secondary">Cancelar</button>
                    </div>
                </div>

                <!-- Ventana de Escena (La Animación) -->
                <div id="scene-view-overlay" class="game-overlay hidden">
                    <div class="scene-frame">
                        <img id="scene-image" src="" alt="Escena de Rol">
                        <div class="scene-controls">
                            <button id="btn-back-selection" class="btn-secondary">Cambiar Acción</button>
                            <button id="btn-close-scene" class="btn-danger">Finalizar</button>
                        </div>
                    </div>
                </div>

                <!-- Overlay de Carga/Estado -->
                <div id="game-overlay" class="hidden">
                    <div class="overlay-content">
                        <p id="overlay-message">Cargando...</p>
                    </div>
                </div>
            </main>

            <aside id="chat-section">
                <div id="chat-log"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="500">
                    <button id="btn-send-chat">Enviar</button>
                </div>
            </aside>
        </section>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
